services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leap}
      POSTGRES_DB: ${POSTGRES_DB:-leap}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  api:
    build:
      context: ./backend
    command: ["scripts/migrate.sh", "start"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ./backend/.env
    # backend/.env often uses localhost for local `uv run`; in Compose the DB hostname is `postgres`.
    environment:
      POSTGRES_CONNECTION_STRING: postgresql+asyncpg://${POSTGRES_USER:-leap}:${POSTGRES_PASSWORD:-leap}@postgres:5432/${POSTGRES_DB:-leap}
    volumes:
      - ./backend/scripts:/app/scripts
    ports:
      - "8000:8000"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    depends_on:
      api:
        condition: service_healthy
    environment:
      BACKEND_INTERNAL_ORIGIN: http://api:8000
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    restart: on-failure

volumes:
  postgres_data:
