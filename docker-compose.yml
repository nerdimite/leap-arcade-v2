services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leap}
      POSTGRES_DB: ${POSTGRES_DB:-leap}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  api:
    build:
      context: ./backend
    command: ["scripts/migrate.sh", "start"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ./backend/.env
    volumes:
      - ./backend/scripts:/app/scripts
    ports:
      - "8000:8000"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
