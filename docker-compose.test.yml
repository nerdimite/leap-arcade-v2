services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leap}
      POSTGRES_DB: leap_test
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

volumes:
  postgres_test_data:
